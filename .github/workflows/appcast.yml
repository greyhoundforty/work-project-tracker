name: Update Sparkle appcast (latest only)

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  appcast:
    runs-on: macos-latest
    steps:
      - name: Download Sparkle tools
        run: |
          set -euxo pipefail
          SPARKLE_VERSION=2.6.4
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o sparkle.tar.xz
          mkdir -p sparkle-tools
          tar -xJf sparkle.tar.xz -C sparkle-tools

      - name: Download the DMG asset for this release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          TAG="${{ github.event.release.tag_name }}"
          DMG="Charter-${TAG}.dmg"

          mkdir -p updates
          gh release download "${TAG}" \
            --repo "${{ github.repository }}" \
            --pattern "${DMG}" \
            --dir updates

          ls -la updates

      - name: Generate appcast.xml (EdDSA, latest only)
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euxo pipefail
          TAG="${{ github.event.release.tag_name }}"

          ./sparkle-tools/bin/generate_appcast \
            --ed-key-file <(echo "$SPARKLE_PRIVATE_KEY") \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/${TAG}/" \
            --link "https://greyhoundforty.github.io/charter-app/" \
            updates/

          test -f updates/appcast.xml
          echo "Generated appcast:"
          head -n 40 updates/appcast.xml

      - name: Checkout gh-pages branch
        run: |
          set -euxo pipefail
          git clone --branch gh-pages --depth 1 \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            gh-pages-dir

      - name: Replace appcast.xml at gh-pages root
        run: |
          set -euxo pipefail
          cp updates/appcast.xml gh-pages-dir/appcast.xml

      - name: Commit and push
        run: |
          set -euxo pipefail
          cd gh-pages-dir
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "chore: appcast ${TAG}" || echo "No changes"
          git push

[tasks.run]
description = "Build and launch EngagementTracker without opening Xcode"
run = """
set -e

# Kill any running instance first
pkill -x EngagementTracker 2>/dev/null || true

# Build
xcodebuild \
  -project EngagementTracker.xcodeproj \
  -scheme EngagementTracker \
  -destination 'platform=macOS,arch=arm64' \
  -configuration Debug \
  build 2>&1 | grep -E "error:|BUILD SUCCEEDED|BUILD FAILED"

# Resolve the built products dir and launch
APP_DIR=$(xcodebuild \
  -project EngagementTracker.xcodeproj \
  -scheme EngagementTracker \
  -configuration Debug \
  -showBuildSettings 2>/dev/null \
  | awk '/BUILT_PRODUCTS_DIR/ { print $3; exit }')

echo "Launching $APP_DIR/EngagementTracker.app"
open "$APP_DIR/EngagementTracker.app"
"""

[tasks.build]
description = "Build EngagementTracker via xcodebuild"
run = """
xcodebuild \
  -project EngagementTracker.xcodeproj \
  -scheme EngagementTracker \
  -destination 'platform=macOS,arch=arm64' \
  -configuration Debug \
  build
"""

[tasks.clean]
description = "Clean EngagementTracker build products"
run = """
xcodebuild \
  -project EngagementTracker.xcodeproj \
  -scheme EngagementTracker \
  clean
"""

[tasks."clean-build"]
description = "Clean then build"
run = """
xcodebuild \
  -project EngagementTracker.xcodeproj \
  -scheme EngagementTracker \
  -destination 'platform=macOS,arch=arm64' \
  -configuration Debug \
  clean build
"""

[tasks.test]
description = "Run unit tests"
run = """
xcodebuild \
  -project EngagementTracker.xcodeproj \
  -scheme EngagementTrackerTests \
  -destination 'platform=macOS,arch=arm64' \
  test
"""

[tasks."db-backup"]
description = "Backup SwiftData store to ~/Desktop/EngagementTracker-backups/"
run = """
BACKUP_DIR="$HOME/Desktop/EngagementTracker-backups"
DB_DIR="$HOME/Library/Containers/com.greyhoundforty.EngagementTracker/Data/Library/Application Support"
TIMESTAMP=$(date +%Y%m%d-%H%M%S)
DEST="$BACKUP_DIR/$TIMESTAMP"

mkdir -p "$DEST"

if [ -d "$DB_DIR" ]; then
  cp -R "$DB_DIR/." "$DEST/"
  echo "Backed up to $DEST"
else
  echo "No database directory found at $DB_DIR (app may not have been run yet)"
fi
"""

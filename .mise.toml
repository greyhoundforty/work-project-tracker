[tasks.run]
description = "Build and launch Manifest without opening Xcode"
run = """
set -e

# Kill any running instance first
pkill -x Manifest 2>/dev/null || true

# Build
xcodebuild \
  -project Manifest.xcodeproj \
  -scheme Manifest \
  -destination 'platform=macOS,arch=arm64' \
  -configuration Debug \
  build 2>&1 | grep -E "error:|BUILD SUCCEEDED|BUILD FAILED"

# Resolve the built products dir and launch
APP_DIR=$(xcodebuild \
  -project Manifest.xcodeproj \
  -scheme Manifest \
  -configuration Debug \
  -showBuildSettings 2>/dev/null \
  | awk '/BUILT_PRODUCTS_DIR/ { print $3; exit }')

echo "Launching $APP_DIR/Manifest.app"
open "$APP_DIR/Manifest.app"
"""

[tasks.build]
description = "Build Manifest via xcodebuild"
run = """
xcodebuild \
  -project Manifest.xcodeproj \
  -scheme Manifest \
  -destination 'platform=macOS,arch=arm64' \
  -configuration Debug \
  build
"""

[tasks.clean]
description = "Clean Manifest build products"
run = """
xcodebuild \
  -project Manifest.xcodeproj \
  -scheme Manifest \
  clean
"""

[tasks."clean-build"]
description = "Clean then build"
run = """
xcodebuild \
  -project Manifest.xcodeproj \
  -scheme Manifest \
  -destination 'platform=macOS,arch=arm64' \
  -configuration Debug \
  clean build
"""

[tasks.test]
description = "Run unit tests"
run = """
xcodebuild \
  -project Manifest.xcodeproj \
  -scheme ManifestTests \
  -destination 'platform=macOS,arch=arm64' \
  test
"""

[tasks."db-backup"]
description = "Backup SwiftData store to ~/Desktop/Manifest-backups/"
run = """
BACKUP_DIR="$HOME/Desktop/Manifest-backups"
DB_DIR="$HOME/Library/Containers/com.greyhoundforty.Manifest/Data/Library/Application Support"
TIMESTAMP=$(date +%Y%m%d-%H%M%S)
DEST="$BACKUP_DIR/$TIMESTAMP"

mkdir -p "$DEST"

if [ -d "$DB_DIR" ]; then
  cp -R "$DB_DIR/." "$DEST/"
  echo "Backed up to $DEST"
else
  echo "No database directory found at $DB_DIR (app may not have been run yet)"
fi
"""

[tasks.package]
description = "Build, sign, notarize, and package Manifest as a DMG"
run = "scripts/build-release.sh"

[tasks.release]
description = "Bump patch version from latest git tag and run release.sh"
run = """
set -euo pipefail

# Get latest tag, strip leading 'v'
LATEST=$(git tag --sort=-version:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

if [[ -z "$LATEST" ]]; then
  echo "Error: no semver tags found. Create an initial tag first (e.g. git tag v0.1.0)"
  exit 1
fi

CLEAN="${LATEST#v}"

MAJOR=$(echo "$CLEAN" | cut -d. -f1)
MINOR=$(echo "$CLEAN" | cut -d. -f2)
PATCH=$(echo "$CLEAN" | cut -d. -f3)

NEW_PATCH=$((PATCH + 1))
NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

echo "Current tag : $LATEST"
echo "New version : $NEW_VERSION"
echo ""

./scripts/release.sh "$NEW_VERSION"
"""

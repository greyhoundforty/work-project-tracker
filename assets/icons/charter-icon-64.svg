<svg xmlns="http://www.w3.org/2000/svg"
     width="64" height="64" viewBox="0 0 64 64">

  <!-- Charter wax-seal mark -->
  <!-- size=64  bg=#1A2340  ring=#E8A530  C=#E8A530 -->

  <defs>
    <!-- Squircle clip (macOS icon shape) -->
    <clipPath id="sq">
      <rect width="64" height="64" rx="14.08" ry="14.08"/>
    </clipPath>
    <!-- Subtle depth gradient (brightens top-left, darkens bottom-right) -->
    <radialGradient id="depth" cx="35%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.10"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect id="bg" width="64" height="64"
        rx="14.08" fill="#1A2340"/>

  <!-- Seal mark -->
  <g id="seal" clip-path="url(#sq)">

    <!-- Outer ring -->
    <circle cx="32.00" cy="32.00" r="26.88"
            stroke="#E8A530" stroke-width="1.41" fill="none"/>

    <!-- Inner ring (slightly transparent) -->
    <circle cx="32.00" cy="32.00" r="23.36"
            stroke="#E8A530" stroke-width="0.83" fill="none" opacity="0.55"/>

    <!-- Radial tick marks (8 × evenly spaced, cardinal + diagonal) -->
    <line x1="32.00" y1="8.64" x2="32.00" y2="5.12" stroke="#E8A530" stroke-width="1.28" opacity="0.6"/>
    <line x1="48.52" y1="15.48" x2="51.01" y2="12.99" stroke="#E8A530" stroke-width="1.28" opacity="0.6"/>
    <line x1="55.36" y1="32.00" x2="58.88" y2="32.00" stroke="#E8A530" stroke-width="1.28" opacity="0.6"/>
    <line x1="48.52" y1="48.52" x2="51.01" y2="51.01" stroke="#E8A530" stroke-width="1.28" opacity="0.6"/>
    <line x1="32.00" y1="55.36" x2="32.00" y2="58.88" stroke="#E8A530" stroke-width="1.28" opacity="0.6"/>
    <line x1="15.48" y1="48.52" x2="12.99" y2="51.01" stroke="#E8A530" stroke-width="1.28" opacity="0.6"/>
    <line x1="8.64" y1="32.00" x2="5.12" y2="32.00" stroke="#E8A530" stroke-width="1.28" opacity="0.6"/>
    <line x1="15.48" y1="15.48" x2="12.99" y2="12.99" stroke="#E8A530" stroke-width="1.28" opacity="0.6"/>

    <!-- Pip dots between ticks (8 × on midpoint ring) -->
    <circle cx="41.61" cy="8.79" r="0.49" fill="#E8A530" opacity="0.35"/>
    <circle cx="55.21" cy="22.39" r="0.49" fill="#E8A530" opacity="0.35"/>
    <circle cx="55.21" cy="41.61" r="0.49" fill="#E8A530" opacity="0.35"/>
    <circle cx="41.61" cy="55.21" r="0.49" fill="#E8A530" opacity="0.35"/>
    <circle cx="22.39" cy="55.21" r="0.49" fill="#E8A530" opacity="0.35"/>
    <circle cx="8.79" cy="41.61" r="0.49" fill="#E8A530" opacity="0.35"/>
    <circle cx="8.79" cy="22.39" r="0.49" fill="#E8A530" opacity="0.35"/>
    <circle cx="22.39" cy="8.79" r="0.49" fill="#E8A530" opacity="0.35"/>

    <!-- C letterform: bold arc, 82° gap opening on the right -->
    <path d="M 42.93 22.50 A 14.48 14.48 0 1 0 42.93 41.50"
          stroke="#E8A530" stroke-width="6.40"
          stroke-linecap="round" fill="none"/>

  </g>

  <!-- Depth overlay (applies gradient on top of everything) -->
  <rect width="64" height="64"
        rx="14.08" fill="url(#depth)"/>

</svg>
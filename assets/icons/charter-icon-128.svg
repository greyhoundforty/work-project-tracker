<svg xmlns="http://www.w3.org/2000/svg"
     width="128" height="128" viewBox="0 0 128 128">

  <!-- Charter wax-seal mark -->
  <!-- size=128  bg=#1A2340  ring=#E8A530  C=#E8A530 -->

  <defs>
    <!-- Squircle clip (macOS icon shape) -->
    <clipPath id="sq">
      <rect width="128" height="128" rx="28.16" ry="28.16"/>
    </clipPath>
    <!-- Subtle depth gradient (brightens top-left, darkens bottom-right) -->
    <radialGradient id="depth" cx="35%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.10"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect id="bg" width="128" height="128"
        rx="28.16" fill="#1A2340"/>

  <!-- Seal mark -->
  <g id="seal" clip-path="url(#sq)">

    <!-- Outer ring -->
    <circle cx="64.00" cy="64.00" r="53.76"
            stroke="#E8A530" stroke-width="2.82" fill="none"/>

    <!-- Inner ring (slightly transparent) -->
    <circle cx="64.00" cy="64.00" r="46.72"
            stroke="#E8A530" stroke-width="1.66" fill="none" opacity="0.55"/>

    <!-- Radial tick marks (8 × evenly spaced, cardinal + diagonal) -->
    <line x1="64.00" y1="17.28" x2="64.00" y2="10.24" stroke="#E8A530" stroke-width="2.56" opacity="0.6"/>
    <line x1="97.04" y1="30.96" x2="102.01" y2="25.99" stroke="#E8A530" stroke-width="2.56" opacity="0.6"/>
    <line x1="110.72" y1="64.00" x2="117.76" y2="64.00" stroke="#E8A530" stroke-width="2.56" opacity="0.6"/>
    <line x1="97.04" y1="97.04" x2="102.01" y2="102.01" stroke="#E8A530" stroke-width="2.56" opacity="0.6"/>
    <line x1="64.00" y1="110.72" x2="64.00" y2="117.76" stroke="#E8A530" stroke-width="2.56" opacity="0.6"/>
    <line x1="30.96" y1="97.04" x2="25.99" y2="102.01" stroke="#E8A530" stroke-width="2.56" opacity="0.6"/>
    <line x1="17.28" y1="64.00" x2="10.24" y2="64.00" stroke="#E8A530" stroke-width="2.56" opacity="0.6"/>
    <line x1="30.96" y1="30.96" x2="25.99" y2="25.99" stroke="#E8A530" stroke-width="2.56" opacity="0.6"/>

    <!-- Pip dots between ticks (8 × on midpoint ring) -->
    <circle cx="83.23" cy="17.58" r="0.97" fill="#E8A530" opacity="0.35"/>
    <circle cx="110.42" cy="44.77" r="0.97" fill="#E8A530" opacity="0.35"/>
    <circle cx="110.42" cy="83.23" r="0.97" fill="#E8A530" opacity="0.35"/>
    <circle cx="83.23" cy="110.42" r="0.97" fill="#E8A530" opacity="0.35"/>
    <circle cx="44.77" cy="110.42" r="0.97" fill="#E8A530" opacity="0.35"/>
    <circle cx="17.58" cy="83.23" r="0.97" fill="#E8A530" opacity="0.35"/>
    <circle cx="17.58" cy="44.77" r="0.97" fill="#E8A530" opacity="0.35"/>
    <circle cx="44.77" cy="17.58" r="0.97" fill="#E8A530" opacity="0.35"/>

    <!-- C letterform: bold arc, 82° gap opening on the right -->
    <path d="M 85.86 45.00 A 28.97 28.97 0 1 0 85.86 83.00"
          stroke="#E8A530" stroke-width="12.80"
          stroke-linecap="round" fill="none"/>

  </g>

  <!-- Depth overlay (applies gradient on top of everything) -->
  <rect width="128" height="128"
        rx="28.16" fill="url(#depth)"/>

</svg>
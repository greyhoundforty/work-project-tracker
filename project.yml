name: Charter
options:
  bundleIdPrefix: com.greyhoundforty
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui.git
    from: 2.4.1
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: 2.9.1
  SwiftThemeKit:
    url: https://github.com/Charlyk/swift-theme-kit.git
    from: 1.2.4

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_HARDENED_RUNTIME: YES
    DEVELOPMENT_TEAM: S6AT3QA6PJ

schemes:
  Charter:
    build:
      targets:
        Charter: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CharterTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  Charter:
    type: application
    platform: macOS
    sources:
      - path: Charter
        excludes:
          - BundledTemplates
      - path: Charter/BundledTemplates
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: Charter
        INFOPLIST_FILE: Charter/Info.plist
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.greyhoundforty.Charter
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
        MARKETING_VERSION: "0.2.8"
        CURRENT_PROJECT_VERSION: "1"
    entitlements:
      path: Charter/Charter.entitlements
    dependencies:
      - sdk: SwiftData.framework
      - sdk: EventKit.framework
      - package: MarkdownUI
      - package: Sparkle
      - package: SwiftThemeKit

  CharterTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - CharterTests
    dependencies:
      - target: Charter
    settings:
      base:
        PRODUCT_NAME: CharterTests
        GENERATE_INFOPLIST_FILE: YES

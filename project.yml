name: Manifest
options:
  bundleIdPrefix: com.greyhoundforty
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui.git
    from: 2.4.1

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Manifest:
    type: application
    platform: macOS
    sources:
      - path: EngagementTracker
        excludes:
          - BundledTemplates
      - path: EngagementTracker/BundledTemplates
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: Manifest
        INFOPLIST_FILE: EngagementTracker/Info.plist
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.greyhoundforty.Manifest
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: EngagementTracker/EngagementTracker.entitlements
    dependencies:
      - sdk: SwiftData.framework
      - package: MarkdownUI

  ManifestTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - EngagementTrackerTests
    dependencies:
      - target: Manifest
    settings:
      base:
        PRODUCT_NAME: ManifestTests
        GENERATE_INFOPLIST_FILE: YES

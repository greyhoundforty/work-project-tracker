name: Manifest
options:
  bundleIdPrefix: com.greyhoundforty
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui.git
    from: 2.4.1

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_HARDENED_RUNTIME: YES
    DEVELOPMENT_TEAM: S6AT3QA6PJ

schemes:
  Manifest:
    build:
      targets:
        Manifest: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ManifestTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  Manifest:
    type: application
    platform: macOS
    sources:
      - path: Manifest
        excludes:
          - BundledTemplates
      - path: Manifest/BundledTemplates
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: Manifest
        INFOPLIST_FILE: Manifest/Info.plist
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.greyhoundforty.Manifest
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.2.2"
        CURRENT_PROJECT_VERSION: "1"
    entitlements:
      path: Manifest/Manifest.entitlements
    dependencies:
      - sdk: SwiftData.framework
      - package: MarkdownUI

  ManifestTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - ManifestTests
    dependencies:
      - target: Manifest
    settings:
      base:
        PRODUCT_NAME: ManifestTests
        GENERATE_INFOPLIST_FILE: YES

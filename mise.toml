[tools]
fnox = "latest"

[tasks."icon:vet"]
description = "Validate app icon sizes and DPI using sips"
run = "bash scripts/vet-icons.sh"

[tasks."icon:fix"]
description = "Validate icons and auto-fix DPI issues"
run = "bash scripts/vet-icons.sh --fix"

[tasks."icon:populate"]
description = "Copy iconset PNGs into xcassets and write Contents.json"
run = "python scripts/populate-xcassets.py"

[tasks."icon:populate-dry"]
description = "Preview populate without writing files"
run = "python scripts/populate-xcassets.py --dry-run"
